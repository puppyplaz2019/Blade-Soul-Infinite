<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blade Soul: Infinite 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }
        #gui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 2px 2px #000; }
        .stat-row { margin-bottom: 5px; font-weight: bold; }
        #shop { position: absolute; right: 10px; top: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #444; border-radius: 8px; pointer-events: auto; }
        .shop-btn { display: block; width: 100%; margin: 5px 0; padding: 8px; background: #222; color: #0f0; border: 1px solid #0f0; cursor: pointer; font-size: 12px; }
        .shop-btn:hover { background: #0f0; color: #000; }
        #msg { position: absolute; bottom: 20%; width: 100%; text-align: center; color: #fb0; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>

<div id="gui">
    <div class="stat-row" style="color: #ff4444;">HP: <span id="hp">100</span></div>
    <div class="stat-row" style="color: #44aaff;">LEVEL: <span id="lvl">1</span></div>
    <div class="stat-row" style="color: #ffff44;">IRON: <span id="iron">0</span></div>
    <div class="stat-row" style="font-size: 12px;">DMG: <span id="dmg">10</span> | SPD: <span id="spd">1.0</span></div>
</div>

<div id="shop">
    <b style="color:#aaa; font-size: 10px;">FORGE UPGRADES</b>
    <button class="shop-btn" onclick="buy('dmg')">SHARPEN BLADE (10 Iron)</button>
    <button class="shop-btn" onclick="buy('hp')">REINFORCE ARMOR (15 Iron)</button>
    <button class="shop-btn" onclick="buy('spd')">LIGHTEN GEAR (20 Iron)</button>
</div>

<div id="msg"></div>

<script>
let scene, camera, renderer, player, floor;
let enemies = [], bullets = [], clock = new THREE.Clock();
let stats = { hp: 100, maxHp: 100, lvl: 1, xp: 0, iron: 0, dmg: 10, spd: 0.15, reach: 4 };
let keys = {};

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);
    scene.fog = new THREE.Fog(0x050508, 10, 50);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambient);
    const point = new THREE.PointLight(0x0088ff, 2, 50);
    point.position.set(0, 10, 0);
    scene.add(point);

    // Floor
    const grid = new THREE.GridHelper(200, 40, 0x444444, 0x222222);
    scene.add(grid);

    // Player (A Blue Knight Capsule)
    const pGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
    const pMat = new THREE.MeshStandardMaterial({ color: 0x0088ff });
    player = new THREE.Mesh(pGeo, pMat);
    player.position.y = 1;
    scene.add(player);

    // Sword (Attached to player)
    const sGeo = new THREE.BoxGeometry(0.1, 1.5, 0.1);
    const sMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0x00ffff, emissiveIntensity: 0.5 });
    player.sword = new THREE.Mesh(sGeo, sMat);
    player.sword.position.set(0.6, 0.2, 0.5);
    player.sword.rotation.x = Math.PI/2;
    player.add(player.sword);

    camera.position.set(0, 10, 10);
    camera.lookAt(player.position);

    window.addEventListener('keydown', e => { 
        keys[e.code] = true; 
        if(e.code === 'Space') attack();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    spawnEnemy();
    animate();
}

function spawnEnemy() {
    const eGeo = new THREE.BoxGeometry(1, 1, 1);
    const eMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
    const enemy = new THREE.Mesh(eGeo, eMat);
    
    // Random position away from player
    const angle = Math.random() * Math.PI * 2;
    const dist = 15 + Math.random() * 10;
    enemy.position.set(Math.cos(angle)*dist, 0.5, Math.sin(angle)*dist);
    
    enemy.hp = 15 + (stats.lvl * 5);
    enemies.push(enemy);
    scene.add(enemy);
}

function attack() {
    // Visual Swing
    player.sword.rotation.z = -Math.PI/2;
    setTimeout(() => player.sword.rotation.z = 0, 150);

    // Hit Logic
    enemies.forEach((en, i) => {
        const dist = player.position.distanceTo(en.position);
        if(dist < stats.reach) {
            en.hp -= stats.dmg;
            en.material.emissive.setHex(0xffffff);
            setTimeout(() => en.material.emissive.setHex(0x000000), 100);
            
            if(en.hp <= 0) {
                scene.remove(en);
                enemies.splice(i, 1);
                stats.iron += Math.floor(Math.random() * 5) + 2;
                stats.xp += 20;
                checkLvl();
                updateUI();
                spawnEnemy();
                if(Math.random() > 0.5) spawnEnemy(); // Progressively more enemies
            }
        }
    });
}

function checkLvl() {
    if(stats.xp >= stats.lvl * 100) {
        stats.lvl++;
        stats.xp = 0;
        showMsg("LEVEL UP: " + stats.lvl);
        // Visual upgrade to sword
        player.sword.scale.y += 0.1;
        player.sword.material.emissiveIntensity += 0.2;
    }
}

function buy(type) {
    if(type === 'dmg' && stats.iron >= 10) { stats.dmg += 5; stats.iron -= 10; showMsg("Blade Sharpened!"); }
    if(type === 'hp' && stats.iron >= 15) { stats.maxHp += 20; stats.hp = stats.maxHp; stats.iron -= 15; showMsg("Armor Reinforced!"); }
    if(type === 'spd' && stats.iron >= 20) { stats.spd += 0.02; stats.iron -= 20; showMsg("Speed Increased!"); }
    updateUI();
}

function updateUI() {
    document.getElementById('hp').innerText = Math.ceil(stats.hp);
    document.getElementById('lvl').innerText = stats.lvl;
    document.getElementById('iron').innerText = stats.iron;
    document.getElementById('dmg').innerText = stats.dmg;
    document.getElementById('spd').innerText = (stats.spd * 10).toFixed(1);
}

function showMsg(txt) {
    const m = document.getElementById('msg');
    m.innerText = txt;
    setTimeout(() => m.innerText = "", 2000);
}

function animate() {
    requestAnimationFrame(animate);
    
    // Player Move
    if(keys['KeyW']) player.position.z -= stats.spd;
    if(keys['KeyS']) player.position.z += stats.spd;
    if(keys['KeyA']) player.position.x -= stats.spd;
    if(keys['KeyD']) player.position.x += stats.spd;

    // Camera follow
    camera.position.x = player.position.x;
    camera.position.z = player.position.z + 10;
    camera.lookAt(player.position);

    // Enemy AI
    enemies.forEach(en => {
        const dir = new THREE.Vector3().subVectors(player.position, en.position).normalize();
        en.position.add(dir.multiplyScalar(0.04 + (stats.lvl * 0.005)));
        en.lookAt(player.position);
        
        if(player.position.distanceTo(en.position) < 1.2) {
            stats.hp -= 0.2;
            updateUI();
            if(stats.hp <= 0) {
                alert("DEFEATED! Level Reached: " + stats.lvl);
                location.reload();
            }
        }
    });

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
