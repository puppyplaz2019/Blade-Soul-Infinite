<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blade Soul: Visible</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        #shop { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid white; color: white; z-index: 10; }
        .btn { display: block; width: 100%; margin: 5px 0; padding: 10px; cursor: pointer; background: #444; color: white; border: 1px solid white; }
        .btn:hover { background: #666; }
    </style>
</head>
<body>

<div id="ui">
    <h2 id="lvl-txt">STAGE 1</h2>
    <div>HP: <span id="hp-txt">100</span></div>
    <div>IRON: <span id="iron-txt">0</span></div>
    <div style="font-size: 12px; margin-top:10px;">WASD to Move | SPACE to Attack</div>
</div>

<div id="shop">
    <b>UPGRADES</b>
    <button class="btn" onclick="buy('dmg')">DMG +5 (10 Iron)</button>
    <button class="btn" onclick="buy('hp')">HEAL & MAX HP (15 Iron)</button>
</div>

<script>
// --- CORE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Sky Blue
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- LIGHTING ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0xffffff, 1);
scene.add(pointLight); // This acts as a "player torch"

// --- THE GRASS ---
const floorGeo = new THREE.PlaneGeometry(1000, 1000);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 }); // Dark Grass Green
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// --- THE PLAYER ---
const playerGeo = new THREE.SphereGeometry(0.7, 32, 32);
const playerMat = new THREE.MeshStandardMaterial({ color: 0x00aaff });
const player = new THREE.Mesh(playerGeo, playerMat);
player.position.y = 0.7;
scene.add(player);

// The Sword
const swordGeo = new THREE.BoxGeometry(0.2, 2.0, 0.2);
const swordMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const sword = new THREE.Mesh(swordGeo, swordMat);
sword.position.set(1, 0, 0.5);
sword.rotation.x = Math.PI / 2;
player.add(sword);

// --- GAME STATE ---
let stats = { hp: 100, maxHp: 100, iron: 0, dmg: 10, lvl: 1, spd: 0.15 };
let enemies = [];
let keys = {};

// --- INPUTS ---
window.addEventListener('keydown', (e) => { 
    keys[e.code] = true; 
    if(e.code === 'Space') attack();
});
window.addEventListener('keyup', (e) => keys[e.code] = false);

function attack() {
    // Animation
    sword.rotation.z = -Math.PI / 2;
    setTimeout(() => sword.rotation.z = 0, 150);

    // Logic
    enemies.forEach((en, i) => {
        const dist = player.position.distanceTo(en.position);
        if(dist < 5) {
            en.hp -= stats.dmg;
            if(en.hp <= 0) {
                scene.remove(en);
                enemies.splice(i, 1);
                stats.iron += 5;
                updateUI();
                spawnEnemy();
                if(Math.random() > 0.7) spawnEnemy();
            }
        }
    });
}

function buy(type) {
    if(type === 'dmg' && stats.iron >= 10) { stats.dmg += 5; stats.iron -= 10; sword.scale.y += 0.2; }
    if(type === 'hp' && stats.iron >= 15) { stats.maxHp += 20; stats.hp = stats.maxHp; stats.iron -= 15; }
    updateUI();
}

function updateUI() {
    document.getElementById('hp-txt').innerText = Math.ceil(stats.hp);
    document.getElementById('iron-txt').innerText = stats.iron;
}

function spawnEnemy() {
    const eGeo = new THREE.BoxGeometry(1, 1, 1);
    const eMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const en = new THREE.Mesh(eGeo, eMat);
    
    const angle = Math.random() * Math.PI * 2;
    const dist = 20;
    en.position.set(
        player.position.x + Math.cos(angle) * dist,
        0.5,
        player.position.z + Math.sin(angle) * dist
    );
    en.hp = 10 + (stats.lvl * 2);
    scene.add(en);
    enemies.push(en);
}

// Initial enemies
for(let i=0; i<3; i++) spawnEnemy();

// --- GAME LOOP ---
function animate() {
    requestAnimationFrame(animate);

    // Movement
    if (keys['KeyW']) player.position.z -= stats.spd;
    if (keys['KeyS']) player.position.z += stats.spd;
    if (keys['KeyA']) player.position.x -= stats.spd;
    if (keys['KeyD']) player.position.x += stats.spd;

    // Camera + Light Follow Player
    camera.position.set(player.position.x, player.position.y + 10, player.position.z + 12);
    camera.lookAt(player.position);
    pointLight.position.set(player.position.x, player.position.y + 5, player.position.z);

    // Enemy AI
    enemies.forEach(en => {
        const moveX = (player.position.x - en.position.x) * 0.01;
        const moveZ = (player.position.z - en.position.z) * 0.01;
        en.position.x += moveX;
        en.position.z += moveZ;

        if(player.position.distanceTo(en.position) < 1.5) {
            stats.hp -= 0.1;
            updateUI();
            if(stats.hp <= 0) {
                alert("Game Over! Iron Collected: " + stats.iron);
                location.reload();
            }
        }
    });

    renderer.render(scene, camera);
}

animate();

// Handle Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
