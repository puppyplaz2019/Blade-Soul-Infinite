<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blade Soul: Whirlwind</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; }
        #ui { position: absolute; top: 15px; left: 15px; color: #2ecc71; pointer-events: none; z-index: 10; text-shadow: 1px 1px #000; }
        #shop { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 8px; border: 1px solid #2ecc71; display: flex; gap: 10px; }
        .btn { padding: 8px; cursor: pointer; background: #111; color: #2ecc71; border: 1px solid #2ecc71; font-size: 11px; }
        #hp-bar { width: 150px; height: 8px; background: #222; border: 1px solid #fff; margin-top: 5px; }
        #hp-fill { height: 100%; background: #e74c3c; width: 100%; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: #fff; font-size: 30px; display: none; }
    </style>
</head>
<body>

<div id="ui">
    <b id="wave-txt">WAVE 1</b>
    <div id="hp-bar"><div id="hp-fill"></div></div>
    <div>IRON: <span id="iron-txt">0</span> | DMG: <span id="dmg-txt">10</span></div>
</div>

<div id="msg">WAVE START</div>

<div id="shop">
    <button class="btn" onclick="buy('dmg')">+DMG (10 Iron)</button>
    <button class="btn" onclick="buy('hp')">HEAL (5 Iron)</button>
</div>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x051505);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1); // Force 1x pixel ratio to stop lag on 4K screens
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- LIGHTING ---
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

// --- GRASS (Ultra-Light) ---
const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshBasicMaterial({ color: 0x1a331a }));
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// --- PLAYER (The Circle) ---
const player = new THREE.Mesh(new THREE.CircleGeometry(0.8, 32), new THREE.MeshBasicMaterial({ color: 0x00aaff }));
player.rotation.x = -Math.PI / 2;
player.position.y = 0.1;
scene.add(player);

const swordGeom = new THREE.BoxGeometry(0.1, 0.1, 3);
const swordMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const sword = new THREE.Mesh(swordGeom, swordMat);
sword.position.y = 0.5;
player.add(sword);

// --- GAME STATE ---
let stats = { hp: 100, iron: 0, dmg: 10, wave: 1, spd: 0.25, attacking: false };
let enemies = [], keys = {};

window.onkeydown = (e) => { 
    keys[e.code] = true; 
    if(e.code === 'Space' && !stats.attacking) whirlwind(); 
};
window.onkeyup = (e) => keys[e.code] = false;

function whirlwind() {
    stats.attacking = true;
    let rotation = 0;
    const speed = 0.4;
    
    const spin = setInterval(() => {
        sword.rotation.y += speed;
        rotation += speed;
        
        // Hit Detection during spin
        enemies.forEach((en, i) => {
            if(player.position.distanceTo(en.position) < (en.userData.isBoss ? 6 : 4)) {
                en.userData.hp -= (stats.dmg / 5); // Multi-hit damage
                en.material.color.set(0xffffff);
                setTimeout(() => en.material.color.set(en.userData.isBoss ? 0x2ecc71 : 0xff4444), 50);

                if(en.userData.hp <= 0) {
                    stats.iron += en.userData.isBoss ? 50 : 5;
                    scene.remove(en);
                    enemies.splice(i, 1);
                    updateUI();
                    if(enemies.length === 0) { stats.wave++; setTimeout(spawnWave, 1500); }
                }
            }
        });

        if(rotation >= Math.PI * 2) {
            clearInterval(spin);
            sword.rotation.y = 0;
            stats.attacking = false;
        }
    }, 20);
}

function spawnWave() {
    document.getElementById('wave-txt').innerText = "WAVE " + stats.wave;
    const msg = document.getElementById('msg');
    msg.innerText = "WAVE " + stats.wave; msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 1000);

    let isBoss = (stats.wave % 5 === 0);
    let count = isBoss ? 1 : 4 + stats.wave;

    for(let i=0; i<count; i++) {
        const en = new THREE.Mesh(
            isBoss ? new THREE.CylinderGeometry(2, 2, 6, 8) : new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshBasicMaterial({ color: isBoss ? 0x2ecc71 : 0xff4444 })
        );
        const a = Math.random() * 6.28;
        const d = 25 + Math.random() * 10;
        en.position.set(player.position.x + Math.cos(a)*d, isBoss ? 3 : 0.5, player.position.z + Math.sin(a)*d);
        en.userData = { hp: isBoss ? 100 + (stats.wave*10) : 20, isBoss };
        scene.add(en);
        enemies.push(en);
    }
}

function buy(type) {
    if(type === 'dmg' && stats.iron >= 10) { stats.dmg += 5; stats.iron -= 10; sword.scale.z += 0.1; }
    if(type === 'hp' && stats.iron >= 5) { stats.hp = 100; stats.iron -= 5; }
    updateUI();
}

function updateUI() {
    document.getElementById('iron-txt').innerText = stats.iron;
    document.getElementById('dmg-txt').innerText = stats.dmg;
    document.getElementById('hp-fill').style.width = stats.hp + "%";
}

function animate() {
    requestAnimationFrame(animate);

    if (keys['KeyW']) player.position.z -= stats.spd;
    if (keys['KeyS']) player.position.z += stats.spd;
    if (keys['KeyA']) player.position.x -= stats.spd;
    if (keys['KeyD']) player.position.x += stats.spd;

    camera.position.set(player.position.x, 15, player.position.z + 12);
    camera.lookAt(player.position);

    enemies.forEach(en => {
        const dir = player.position.clone().sub(en.position).normalize();
        en.position.add(dir.multiplyScalar(en.userData.isBoss ? 0.04 : 0.08));
        if(player.position.distanceTo(en.position) < (en.userData.isBoss ? 2.5 : 1.2)) {
            stats.hp -= 0.2;
            updateUI();
            if(stats.hp <= 0) location.reload();
        }
    });

    renderer.render(scene, camera);
}

spawnWave();
animate();
</script>
</body>
</html>
